<svg width="100%" viewBox="0 0 680 860" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, sans-serif; fill: #2C2C2A; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue .th { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }
    .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal .th { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple .th { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }
    .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber .th { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }
    .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
    .dash { stroke: #888780; stroke-width: 0.5; fill: none; stroke-dasharray: 5 3; }
  </style>
</defs>

<!-- GCP outer container -->
<g class="c-gray">
  <rect x="20" y="20" width="640" height="820" rx="16" stroke-width="0.5"/>
  <text class="th" x="40" y="48" dominant-baseline="central">Google Cloud Platform</text>
  <text class="ts" x="40" y="66" dominant-baseline="central">Cloud Run · europe-west1 · 2 vCPU · 2 GiB</text>
</g>

<!-- nginx ingress -->
<g class="c-gray">
  <rect x="40" y="84" width="600" height="64" rx="10" stroke-width="0.5"/>
  <text class="th" x="340" y="108" text-anchor="middle" dominant-baseline="central">nginx :8080</text>
  <text class="ts" x="340" y="126" text-anchor="middle" dominant-baseline="central">Landing page · /.well-known/agent.json · proxy to ADK</text>
</g>
<line x1="340" y1="148" x2="340" y2="170" class="arr" marker-end="url(#arrow)"/>

<!-- ADK layer -->
<g class="c-blue">
  <rect x="40" y="170" width="600" height="130" rx="10" stroke-width="0.5"/>
  <text class="th" x="60" y="194" dominant-baseline="central">ADK orchestration layer · :8081</text>
  <text class="ts" x="60" y="212" dominant-baseline="central">Vertex AI · Gemini 2.5 Flash</text>
</g>
<g class="c-blue">
  <rect x="180" y="220" width="320" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="242" text-anchor="middle" dominant-baseline="central">windops_coordinator</text>
  <text class="ts" x="340" y="260" text-anchor="middle" dominant-baseline="central">LlmAgent · routes all user requests</text>
</g>

<!-- coordinator → agents arrows -->
<line x1="225" y1="276" x2="100" y2="336" class="arr" marker-end="url(#arrow)"/>
<line x1="272" y1="276" x2="212" y2="336" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="276" x2="340" y2="336" class="arr" marker-end="url(#arrow)"/>
<line x1="408" y1="276" x2="468" y2="336" class="arr" marker-end="url(#arrow)"/>
<line x1="455" y1="276" x2="580" y2="336" class="arr" marker-end="url(#arrow)"/>

<!-- 5 specialist agents -->
<g class="c-teal"><rect x="52" y="336" width="108" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="106" y="357" text-anchor="middle" dominant-baseline="central">task_agent</text>
  <text class="ts" x="106" y="375" text-anchor="middle" dominant-baseline="central">5 tools · :8002</text></g>
<g class="c-teal"><rect x="172" y="336" width="124" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="234" y="357" text-anchor="middle" dominant-baseline="central">schedule_agent</text>
  <text class="ts" x="234" y="375" text-anchor="middle" dominant-baseline="central">6 tools · :8003</text></g>
<g class="c-teal"><rect x="308" y="336" width="132" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="374" y="357" text-anchor="middle" dominant-baseline="central">knowledge_agent</text>
  <text class="ts" x="374" y="375" text-anchor="middle" dominant-baseline="central">4 tools · :8001</text></g>
<g class="c-teal"><rect x="452" y="336" width="124" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="514" y="357" text-anchor="middle" dominant-baseline="central">analytics_agent</text>
  <text class="ts" x="514" y="375" text-anchor="middle" dominant-baseline="central">4 tools · :8004</text></g>
<g class="c-teal"><rect x="588" y="336" width="72" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="624" y="357" text-anchor="middle" dominant-baseline="central">alert_agent</text>
  <text class="ts" x="624" y="375" text-anchor="middle" dominant-baseline="central">4 tools · :8005</text></g>

<!-- Workflow agents container -->
<rect x="40" y="420" width="600" height="130" rx="10" stroke-width="0.5" class="dash"/>
<text class="ts" x="56" y="440" dominant-baseline="central">Workflow agents (sub_agents)</text>
<g class="c-purple"><rect x="52" y="450" width="148" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="126" y="470" text-anchor="middle" dominant-baseline="central">triage_workflow</text>
  <text class="ts" x="126" y="488" text-anchor="middle" dominant-baseline="central">SequentialAgent</text></g>
<g class="c-purple"><rect x="212" y="450" width="132" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="278" y="470" text-anchor="middle" dominant-baseline="central">weekly_planner</text>
  <text class="ts" x="278" y="488" text-anchor="middle" dominant-baseline="central">LlmAgent</text></g>
<g class="c-purple"><rect x="356" y="450" width="128" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="420" y="470" text-anchor="middle" dominant-baseline="central">shift_handover</text>
  <text class="ts" x="420" y="488" text-anchor="middle" dominant-baseline="central">LlmAgent</text></g>
<g class="c-purple"><rect x="496" y="450" width="132" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="562" y="470" text-anchor="middle" dominant-baseline="central">escalation_loop</text>
  <text class="ts" x="562" y="488" text-anchor="middle" dominant-baseline="central">LoopAgent</text></g>
<g class="c-purple"><rect x="52" y="516" width="176" height="24" rx="6" stroke-width="0.5"/>
  <text class="ts" x="140" y="528" text-anchor="middle" dominant-baseline="central">morning_briefing · ParallelAgent</text></g>
<g class="c-purple"><rect x="240" y="516" width="200" height="24" rx="6" stroke-width="0.5"/>
  <text class="ts" x="340" y="528" text-anchor="middle" dominant-baseline="central">turbine_situation_report · LlmAgent</text></g>

<!-- MCP servers container -->
<rect x="40" y="578" width="600" height="100" rx="10" stroke-width="0.5" class="dash"/>
<text class="ts" x="56" y="598" dominant-baseline="central">FastMCP servers (HTTP transport)</text>
<g class="c-amber"><rect x="52" y="608" width="100" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="102" y="625" text-anchor="middle" dominant-baseline="central">knowledge</text>
  <text class="ts" x="102" y="641" text-anchor="middle" dominant-baseline="central">:8001</text></g>
<g class="c-amber"><rect x="164" y="608" width="88" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="208" y="625" text-anchor="middle" dominant-baseline="central">task</text>
  <text class="ts" x="208" y="641" text-anchor="middle" dominant-baseline="central">:8002</text></g>
<g class="c-amber"><rect x="264" y="608" width="100" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="314" y="625" text-anchor="middle" dominant-baseline="central">schedule</text>
  <text class="ts" x="314" y="641" text-anchor="middle" dominant-baseline="central">:8003</text></g>
<g class="c-amber"><rect x="376" y="608" width="104" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="428" y="625" text-anchor="middle" dominant-baseline="central">analytics</text>
  <text class="ts" x="428" y="641" text-anchor="middle" dominant-baseline="central">:8004</text></g>
<g class="c-amber"><rect x="492" y="608" width="80" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="532" y="625" text-anchor="middle" dominant-baseline="central">alert</text>
  <text class="ts" x="532" y="641" text-anchor="middle" dominant-baseline="central">:8005</text></g>

<line x1="340" y1="678" x2="340" y2="714" class="arr" marker-end="url(#arrow)"/>

<!-- Firestore -->
<g class="c-amber">
  <rect x="40" y="714" width="600" height="64" rx="10" stroke-width="0.5"/>
  <text class="th" x="340" y="737" text-anchor="middle" dominant-baseline="central">Firestore (europe-west3)</text>
  <text class="ts" x="340" y="755" text-anchor="middle" dominant-baseline="central">tasks · shifts · alerts · documents · technicians · maintenance_windows · analytics_cache</text>
</g>

<!-- Vertex AI -->
<g class="c-blue">
  <rect x="40" y="796" width="600" height="44" rx="10" stroke-width="0.5"/>
  <text class="th" x="340" y="818" text-anchor="middle" dominant-baseline="central">Vertex AI · Gemini 2.5 Flash (model inference)</text>
