steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/wind-ops-repo/wind-ops-assistant:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/wind-ops-repo/wind-ops-assistant:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'wind-ops-assistant'
      - '--image=europe-west1-docker.pkg.dev/$PROJECT_ID/wind-ops-repo/wind-ops-assistant:latest'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=europe-west3,GOOGLE_GENAI_USE_VERTEXAI=TRUE'

options:
  logging: CLOUD_LOGGING_ONLY